<template>
    <div class="advanced-compare">

        <!-- Global Settings Bar -->
        <div class="settings-bar">
            <div class="settings-inner">
                <div class="settings-field tax-field">
                    <lightning-input
                        type="number"
                        data-id="taxBracket"
                        label="Federal Tax Bracket (%)"
                        value={taxBracket}
                        min="0"
                        max="100"
                        step="0.1"
                        placeholder="e.g. 22"
                        onchange={handleTaxBracketChange}
                        field-level-help="Optional. Your marginal federal income tax rate. Used to calculate tax savings from HSA/FSA/LP-FSA contributions."
                        message-when-range-overflow="Must be 100 or less"
                        message-when-range-underflow="Must be 0 or more">
                    </lightning-input>
                </div>
                <div class="settings-field freq-field">
                    <lightning-combobox
                        name="premiumFrequency"
                        label="Premium Frequency"
                        value={premiumFrequency}
                        options={premiumFrequencyOptions}
                        onchange={handleFrequencyChange}
                        field-level-help="How often your premium is deducted from payroll.">
                    </lightning-combobox>
                </div>
            </div>
        </div>

        <!-- Validation Errors -->
        <template lwc:if={hasValidationErrors}>
            <div class="validation-banner" role="alert">
                <lightning-icon icon-name="utility:error" size="x-small"
                                variant="error" class="error-icon"></lightning-icon>
                <div class="error-list">
                    <template for:each={validationErrors} for:item="error">
                        <p key={error} class="error-item">{error}</p>
                    </template>
                </div>
            </div>
        </template>

        <!-- Shared Expected Annual Usage -->
        <div class="usage-panel">
            <div class="usage-panel-header" role="button" tabindex="0"
                 onclick={toggleUsagePanel} onkeydown={toggleUsagePanel}>
                <div class="usage-panel-header-left">
                    <lightning-icon icon-name="standard:event" size="small" class="usage-panel-icon"></lightning-icon>
                    <div>
                        <h2 class="usage-panel-title">Expected Annual Usage</h2>
                        <p class="usage-panel-subtitle">Enter how many visits and prescription fills you expect per year. This applies to all plans.</p>
                    </div>
                </div>
                <lightning-icon icon-name={usagePanelChevron} size="x-small" class="usage-chevron"></lightning-icon>
            </div>
            <template lwc:if={showUsagePanel}>
                <div class="usage-panel-body">
                    <div class="usage-section-label">Medical Visits</div>
                    <div class="usage-fields-grid">
                        <div class="usage-field">
                            <lightning-input type="number" label="PCP Visits"
                                value={usage.usagePcp} data-usage="usagePcp" min="0" step="1"
                                placeholder="0" onchange={handleUsageChange}>
                            </lightning-input>
                        </div>
                        <div class="usage-field">
                            <lightning-input type="number" label="Specialist Visits"
                                value={usage.usageSpecialist} data-usage="usageSpecialist" min="0" step="1"
                                placeholder="0" onchange={handleUsageChange}>
                            </lightning-input>
                        </div>
                        <div class="usage-field">
                            <lightning-input type="number" label="Urgent Care"
                                value={usage.usageUrgentCare} data-usage="usageUrgentCare" min="0" step="1"
                                placeholder="0" onchange={handleUsageChange}>
                            </lightning-input>
                        </div>
                        <div class="usage-field">
                            <lightning-input type="number" label="ER Visits"
                                value={usage.usageER} data-usage="usageER" min="0" step="1"
                                placeholder="0" onchange={handleUsageChange}>
                            </lightning-input>
                        </div>
                        <div class="usage-field">
                            <lightning-input type="number" label="Virtual Primary Care"
                                value={usage.usageVirtualPrimary} data-usage="usageVirtualPrimary" min="0" step="1"
                                placeholder="0" onchange={handleUsageChange}>
                            </lightning-input>
                        </div>
                        <div class="usage-field">
                            <lightning-input type="number" label="Virtual Urgent Care"
                                value={usage.usageVirtualUrgent} data-usage="usageVirtualUrgent" min="0" step="1"
                                placeholder="0" onchange={handleUsageChange}>
                            </lightning-input>
                        </div>
                        <div class="usage-field">
                            <lightning-input type="number" label="Preventive Care"
                                value={usage.usagePreventive} data-usage="usagePreventive" min="0" step="1"
                                placeholder="0" onchange={handleUsageChange}>
                            </lightning-input>
                        </div>
                        <div class="usage-field">
                            <lightning-input type="number" label="Prenatal Care"
                                value={usage.usagePrenatal} data-usage="usagePrenatal" min="0" step="1"
                                placeholder="0" onchange={handleUsageChange}>
                            </lightning-input>
                        </div>
                        <div class="usage-field">
                            <lightning-input type="number" label="Mental Health"
                                value={usage.usageMentalHealth} data-usage="usageMentalHealth" min="0" step="1"
                                placeholder="0" onchange={handleUsageChange}>
                            </lightning-input>
                        </div>
                        <div class="usage-field">
                            <lightning-input type="number" label="X-Ray / Lab Work"
                                value={usage.usageXrayLab} data-usage="usageXrayLab" min="0" step="1"
                                placeholder="0" onchange={handleUsageChange}>
                            </lightning-input>
                        </div>
                        <div class="usage-field">
                            <lightning-input type="number" label="Inpatient Admissions"
                                value={usage.usageInpatient} data-usage="usageInpatient" min="0" step="1"
                                placeholder="0" onchange={handleUsageChange}>
                            </lightning-input>
                        </div>
                    </div>

                    <div class="usage-section-label rx-label">Prescription Fills</div>
                    <div class="usage-fields-grid">
                        <div class="usage-field">
                            <lightning-input type="number" label="Generic Rx"
                                value={usage.usageGenericRx} data-usage="usageGenericRx" min="0" step="1"
                                placeholder="0" onchange={handleUsageChange}>
                            </lightning-input>
                        </div>
                        <div class="usage-field">
                            <lightning-input type="number" label="Preferred Rx"
                                value={usage.usagePreferredRx} data-usage="usagePreferredRx" min="0" step="1"
                                placeholder="0" onchange={handleUsageChange}>
                            </lightning-input>
                        </div>
                        <div class="usage-field">
                            <lightning-input type="number" label="Non-Preferred Rx"
                                value={usage.usageNonPreferredRx} data-usage="usageNonPreferredRx" min="0" step="1"
                                placeholder="0" onchange={handleUsageChange}>
                            </lightning-input>
                        </div>
                        <div class="usage-field">
                            <lightning-input type="number" label="Specialty Rx"
                                value={usage.usageSpecialtyRx} data-usage="usageSpecialtyRx" min="0" step="1"
                                placeholder="0" onchange={handleUsageChange}>
                            </lightning-input>
                        </div>
                    </div>
                </div>
            </template>
        </div>

        <!-- Plan Cards – Horizontal Scroll -->
        <div class={scrollContainerClass}>
            <div class="plans-scroll" onscroll={handleCardsScroll}>
                <template for:each={plansWithMeta} for:item="plan">
                    <div key={plan.key} class="plan-card-wrapper">
                        <c-plan-advanced-card
                            plan-data={plan}
                            plan-index={plan.index}
                            can-remove={plan.canRemove}
                            premium-label={premiumLabel}
                            onplanchange={handlePlanChange}
                            onremoveplan={handleRemovePlan}>
                        </c-plan-advanced-card>
                    </div>
                </template>

                <!-- Add Plan Button -->
                <template lwc:if={canAddPlan}>
                    <div class="add-plan-card" role="button" tabindex="0"
                         title={addPlanTooltip}
                         onclick={handleAddPlan}
                         onkeydown={handleAddPlan}>
                        <div class="add-plan-inner">
                            <lightning-icon icon-name="utility:add" size="large"
                                            class="add-icon"></lightning-icon>
                            <span class="add-label">Add Plan</span>
                            <span class="add-sublabel">{planCount} of 5</span>
                        </div>
                    </div>
                </template>
            </div>
            <template lwc:if={showScrollHint}>
                <div class="scroll-indicator">
                    <span class="scroll-hint">
                        <lightning-icon icon-name="utility:chevronleft" size="xx-small" class="scroll-hint-icon"></lightning-icon>
                        Scroll to see all plans
                        <lightning-icon icon-name="utility:chevronright" size="xx-small" class="scroll-hint-icon"></lightning-icon>
                    </span>
                </div>
            </template>
        </div>

        <!-- Action Buttons -->
        <div class="action-bar">
            <lightning-button
                label="Reset"
                variant="neutral"
                icon-name="utility:refresh"
                onclick={handleReset}
                class="action-btn">
            </lightning-button>
            <lightning-button
                label={saveButtonLabel}
                variant="neutral"
                icon-name="utility:save"
                onclick={handleSave}
                disabled={isSaving}
                class="action-btn">
            </lightning-button>
            <lightning-button
                label={compareButtonLabel}
                variant="brand"
                icon-name="utility:chart"
                onclick={handleCompare}
                disabled={cannotCompare}
                class="action-btn">
            </lightning-button>
        </div>

        <!-- Results -->
        <template lwc:if={showResults}>
            <c-plan-advanced-results results={results}></c-plan-advanced-results>
        </template>

        <!-- Save Success Modal -->
        <template lwc:if={showSaveModal}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open save-modal">
                <div class="slds-modal__container">
                    <div class="modal-content">
                        <div class="modal-header-custom">
                            <lightning-icon icon-name="utility:success" size="medium" variant="success" class="modal-success-icon"></lightning-icon>
                            <h2 class="modal-title">{saveModalTitle}</h2>
                        </div>
                        <div class="modal-body-custom">
                            <p class="modal-instruction">Use this ID to retrieve your comparison later:</p>
                            <div class="modal-id-display">
                                <span class="modal-id-value">{savedComparisonId}</span>
                                <lightning-button-icon
                                    icon-name="utility:copy"
                                    alternative-text="Copy ID"
                                    title="Copy to clipboard"
                                    onclick={handleCopyId}
                                    class="modal-copy-btn">
                                </lightning-button-icon>
                                <template lwc:if={copyToastVisible}>
                                    <span class="copy-toast">✓ Copied!</span>
                                </template>
                            </div>
                            <p class="modal-note">Save this ID somewhere safe — you'll need it to reload your comparison.</p>
                        </div>
                        <div class="modal-footer-custom">
                            <lightning-button
                                label="Done"
                                variant="brand"
                                onclick={handleCloseSaveModal}>
                            </lightning-button>
                        </div>
                    </div>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

    </div>
</template>
